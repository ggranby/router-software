name: Hornet Link Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build packages and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure and build app
        working-directory: Programs/dcsbios-serial-bridge
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64
          cmake --build build --config Release

      - name: Build release zip bundle
        working-directory: Programs/dcsbios-serial-bridge
        shell: cmd
        run: build-package.cmd Release

      - name: Build CPack ZIP package
        working-directory: Programs/dcsbios-serial-bridge
        shell: cmd
        run: make-installer.cmd ZIP Release

      - name: Collect release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null

          Copy-Item "Programs/dcsbios-serial-bridge/dist/hornet-link-Release.zip" "release-assets/" -Force

          $cpackZip = Get-ChildItem "Programs/dcsbios-serial-bridge/build" -Filter "hornet-link-*-Windows.zip" | Select-Object -First 1
          if (-not $cpackZip) {
            throw "Expected CPack ZIP not found under Programs/dcsbios-serial-bridge/build"
          }
          Copy-Item $cpackZip.FullName "release-assets/" -Force

          Get-ChildItem "release-assets" -File | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "{0}  {1}" -f $hash.Hash.ToLower(), $_.Name
          } | Set-Content "release-assets/SHA256SUMS.txt" -Encoding utf8

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/*.zip
            release-assets/SHA256SUMS.txt
